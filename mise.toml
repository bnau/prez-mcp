[tools]
"node" = "latest"
"npm:copilot-api" = "latest"
"npm:bun" = "latest"

[env]
ANTHROPIC_BASE_URL = "http://localhost:4141"
ANTHROPIC_AUTH_TOKEN = "sk-dummy"
ANTHROPIC_MODEL = "claude-sonnet-4.5"
ANTHROPIC_DEFAULT_HAIKU_MODEL = "gpt-5-mini"
DISABLE_NON_ESSENTIAL_MODEL_CALLS = "1"
CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1"

[tasks.inspect_demo1]
run = "npx @modelcontextprotocol/inspector@0.21.1 --transport http --url http://localhost:8000/mcp"

[tasks.inspect_demo2]
run = "npx @modelcontextprotocol/inspector@0.21.1 --transport http --url http://localhost:8001/mcp"

[tasks.run_server_demo1]
run = "uv run mcp_server/server_demo1.py"

[tasks.run_server_demo2]
run = "uv run mcp_server/server_demo2.py"

[tasks.run_client]
run = "uv run mcp_client/client.py"
